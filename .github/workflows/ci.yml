name: CI test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake doxygen graphviz git

      - name: Install LLVM (clang) and Enzyme
        run: brew install llvm enzyme lld

      - name: Add brew LLVM to PATH 
        run: echo "$(brew --prefix llvm)/bin" >> $GITHUB_PATH

      - name: Debug build
        run: |
          cmake --preset debug \
            -D Enzyme_DIR="$(brew --prefix enzyme)/lib/cmake/Enzyme"
          cmake --build build/debug -j2
          ctest --test-dir build/debug --output-on-failure

      - name: Release build
        run: |
          cmake --preset release \
            -D Enzyme_DIR="$(brew --prefix enzyme)/lib/cmake/Enzyme"
          cmake --build build/release -j2
          ctest --test-dir build/release --output-on-failure

      - name: Release-max build
        run: |
          cmake --preset release-max \
            -D Enzyme_DIR="$(brew --prefix enzyme)/lib/cmake/Enzyme"
          cmake --build build/release-max -j2
          ctest --test-dir build/release-max --output-on-failure
